# Publishes prebuilt app bundles on every push to main, so a plain git push is
# a complete release: the cloud reads catalog.json straight from GitHub raw,
# and this uploads the matching dist/ bundles to the public Blob store
# (apps/<id>/<version>/<key>). Without this, a version bump would 302 to a
# blob path that doesn't exist yet.
name: publish-bundles
on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airglow-catalog
    steps:
      - uses: actions/checkout@v4
        with:
          path: airglow-catalog
      # build-catalog reuses the host's bundler (`airglow internal-build`) from
      # a sibling airglow-sdk checkout, same layout as a dev machine. The host
      # has no runtime deps, so no install step for it.
      - uses: actions/checkout@v4
        with:
          repository: airglow-inc/airglow-sdk
          path: airglow-sdk
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Installs each app's declared deps and proves manifests + bundles are clean.
      - run: bun scripts/validate.mjs
      - run: bun scripts/build-catalog.mjs
      # catalog.json must be regenerated before committing — fail loudly if the
      # committed index drifted from what the apps actually contain, since the
      # cloud serves the committed file but the upload below serves the rebuilt one.
      - run: git diff --exit-code catalog.json
      - run: bun scripts/upload-bundles.mjs
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
